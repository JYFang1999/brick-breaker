<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRICK BREAKER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a14;
    --panel: #0b1628;
    --neon-blue: #00c8ff;
    --neon-pink: #ff2d78;
    --neon-green: #00ff9d;
    --neon-yellow: #ffe600;
    --neon-purple: #bf00ff;
    --text: #c8e0ff;
    --grid: rgba(0,200,255,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 20px;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    color: var(--neon-blue);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-shadow: 0 0 12px var(--neon-blue), 0 0 40px rgba(0,200,255,0.3);
  }

  .hud {
    display: flex;
    gap: 32px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }

  .hud-item label {
    color: rgba(200,224,255,0.4);
    display: block;
    font-size: 0.6rem;
    margin-bottom: 2px;
  }

  .hud-item span {
    color: var(--neon-green);
    font-size: 1.1rem;
    font-weight: 700;
    text-shadow: 0 0 8px var(--neon-green);
  }

  .canvas-wrap {
    position: relative;
  }

  canvas {
    display: block;
    border: 1px solid rgba(0,200,255,0.2);
    box-shadow:
      0 0 0 1px rgba(0,200,255,0.08),
      0 0 30px rgba(0,200,255,0.08),
      inset 0 0 60px rgba(0,0,0,0.6);
    background: #060d1e;
    cursor: none;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(5,10,20,0.88);
    backdrop-filter: blur(4px);
  }

  .overlay h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 0.15em;
  }

  .overlay h2.win  { color: var(--neon-green); text-shadow: 0 0 16px var(--neon-green); }
  .overlay h2.lose { color: var(--neon-pink);  text-shadow: 0 0 16px var(--neon-pink); }
  .overlay h2.start{ color: var(--neon-blue);  text-shadow: 0 0 16px var(--neon-blue); }

  .overlay p {
    font-size: 0.78rem;
    color: rgba(200,224,255,0.55);
    letter-spacing: 0.08em;
  }

  .btn {
    margin-top: 8px;
    padding: 10px 32px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--neon-blue);
    border: none;
    cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 16px rgba(0,200,255,0.4);
  }

  .btn:hover {
    background: var(--neon-green);
    box-shadow: 0 0 24px rgba(0,255,157,0.5);
  }

  footer {
    font-size: 0.62rem;
    color: rgba(200,224,255,0.2);
    letter-spacing: 0.12em;
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>Brick Breaker</h1>
  </header>

  <div class="hud">
    <div class="hud-item"><label>SCORE</label><span id="scoreVal">0</span></div>
    <div class="hud-item"><label>LEVEL</label><span id="levelVal">1</span></div>
    <div class="hud-item"><label>LIVES</label><span id="livesVal">3</span></div>
    <div class="hud-item"><label>HI-SCORE</label><span id="hiVal">0</span></div>
  </div>

  <div class="canvas-wrap">
    <canvas id="c" width="520" height="420"></canvas>
    <div class="overlay" id="overlay">
      <h2 class="start">BRICK BREAKER</h2>
      <p>Move mouse / arrow keys &nbsp;·&nbsp; Keep the ball alive</p>
      <button class="btn" id="startBtn">START GAME</button>
    </div>
  </div>

  <footer>MOUSE OR ← → ARROW KEYS TO MOVE PADDLE</footer>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const scoreEl = document.getElementById('scoreVal');
const levelEl = document.getElementById('levelVal');
const livesEl = document.getElementById('livesVal');
const hiEl    = document.getElementById('hiVal');

const W = canvas.width, H = canvas.height;

// ─── palette ────────────────────────────────────────────
const COLORS = [
  { fill:'#ff2d78', glow:'rgba(255,45,120,0.7)' },
  { fill:'#ff7b00', glow:'rgba(255,123,0,0.7)'  },
  { fill:'#ffe600', glow:'rgba(255,230,0,0.7)'  },
  { fill:'#00ff9d', glow:'rgba(0,255,157,0.7)'  },
  { fill:'#00c8ff', glow:'rgba(0,200,255,0.7)'  },
  { fill:'#bf00ff', glow:'rgba(191,0,255,0.7)'  },
];

// ─── game constants ──────────────────────────────────────
const PADDLE_H = 10, BALL_R = 7;
const BRICK_COLS = 10, BRICK_ROWS = 5;
const BRICK_W = 44, BRICK_H = 16;
const BRICK_PAD = 4;
const BRICK_OFFSET_X = (W - (BRICK_COLS*(BRICK_W+BRICK_PAD)-BRICK_PAD))/2;
const BRICK_OFFSET_Y = 48;

let score, hiScore=0, level, lives;
let paddle, ball, bricks, particles;
let keys = {}, mouseX = null;
let animId, state = 'idle'; // idle | playing | paused

// ─── init ────────────────────────────────────────────────
function initGame() {
  score = 0; level = 1; lives = 3;
  paddle = { x: W/2, w: 80, y: H-28, speed: 7 };
  spawnBall();
  buildBricks();
  particles = [];
  updateHUD();
}

function spawnBall() {
  const angle = (-Math.PI/2) + (Math.random()-0.5)*0.8;
  const spd = 4 + level*0.4;
  ball = {
    x: paddle ? paddle.x : W/2,
    y: H - 60,
    vx: Math.cos(angle)*spd,
    vy: Math.sin(angle)*spd,
    trail: []
  };
}

function buildBricks() {
  bricks = [];
  for(let r=0; r<BRICK_ROWS; r++) {
    const col = COLORS[r % COLORS.length];
    for(let c=0; c<BRICK_COLS; c++) {
      bricks.push({
        x: BRICK_OFFSET_X + c*(BRICK_W+BRICK_PAD),
        y: BRICK_OFFSET_Y + r*(BRICK_H+BRICK_PAD),
        w: BRICK_W, h: BRICK_H,
        alive: true,
        col,
        hp: r<2 ? 1 : 1
      });
    }
  }
}

// ─── particles ───────────────────────────────────────────
function burst(x, y, col) {
  for(let i=0; i<14; i++) {
    const a = Math.random()*Math.PI*2;
    const spd = 1+Math.random()*3;
    particles.push({
      x, y,
      vx: Math.cos(a)*spd,
      vy: Math.sin(a)*spd,
      life: 1,
      decay: 0.03+Math.random()*0.04,
      r: 2+Math.random()*3,
      col: col.fill,
      glow: col.glow
    });
  }
}

// ─── update ──────────────────────────────────────────────
function update() {
  // paddle
  const pw = paddle.w;
  if(keys['ArrowLeft'])  paddle.x = Math.max(pw/2, paddle.x - paddle.speed);
  if(keys['ArrowRight']) paddle.x = Math.min(W-pw/2, paddle.x + paddle.speed);
  if(mouseX !== null) {
    paddle.x += (mouseX - paddle.x) * 0.25;
    paddle.x = Math.max(pw/2, Math.min(W-pw/2, paddle.x));
  }

  // ball trail
  ball.trail.push({x:ball.x, y:ball.y});
  if(ball.trail.length>10) ball.trail.shift();

  // ball move
  ball.x += ball.vx;
  ball.y += ball.vy;

  // wall collisions
  if(ball.x - BALL_R < 0)   { ball.x = BALL_R;   ball.vx = Math.abs(ball.vx); }
  if(ball.x + BALL_R > W)   { ball.x = W-BALL_R; ball.vx = -Math.abs(ball.vx); }
  if(ball.y - BALL_R < 0)   { ball.y = BALL_R;   ball.vy = Math.abs(ball.vy); }

  // ball lost
  if(ball.y > H + 20) {
    lives--;
    updateHUD();
    if(lives <= 0) { gameOver(); return; }
    spawnBall();
  }

  // paddle collision
  const px = paddle.x, py = paddle.y;
  const half = paddle.w/2;
  if(
    ball.y + BALL_R >= py &&
    ball.y - BALL_R <= py + PADDLE_H &&
    ball.x >= px - half &&
    ball.x <= px + half &&
    ball.vy > 0
  ) {
    ball.vy = -Math.abs(ball.vy);
    // angle based on hit position
    const rel = (ball.x - px) / half;
    ball.vx = rel * (4 + level*0.3);
    const spd = Math.hypot(ball.vx, ball.vy);
    const maxSpd = 7 + level*0.4;
    if(spd > maxSpd) { ball.vx *= maxSpd/spd; ball.vy *= maxSpd/spd; }
  }

  // brick collisions
  let aliveCt = 0;
  for(const b of bricks) {
    if(!b.alive) continue;
    aliveCt++;
    if(
      ball.x + BALL_R > b.x &&
      ball.x - BALL_R < b.x + b.w &&
      ball.y + BALL_R > b.y &&
      ball.y - BALL_R < b.y + b.h
    ) {
      // which side?
      const overlapL = ball.x + BALL_R - b.x;
      const overlapR = b.x + b.w - (ball.x - BALL_R);
      const overlapT = ball.y + BALL_R - b.y;
      const overlapB = b.y + b.h - (ball.y - BALL_R);
      const minH = Math.min(overlapL, overlapR);
      const minV = Math.min(overlapT, overlapB);
      if(minH < minV) ball.vx *= -1; else ball.vy *= -1;

      b.alive = false;
      burst(b.x+b.w/2, b.y+b.h/2, b.col);
      score += 10 * level;
      if(score > hiScore) hiScore = score;
      updateHUD();
      break;
    }
  }

  if(aliveCt === 0) { nextLevel(); return; }

  // particles
  for(const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.life -= p.decay;
  }
  particles = particles.filter(p=>p.life>0);
}

// ─── draw ────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,W,H);

  // bricks
  for(const b of bricks) {
    if(!b.alive) continue;
    ctx.save();
    ctx.shadowColor = b.col.glow;
    ctx.shadowBlur = 8;
    ctx.fillStyle = b.col.fill;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(b.x, b.y, b.w, 4);
    ctx.restore();
  }

  // particles
  for(const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.glow;
    ctx.shadowBlur = 10;
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ball trail
  for(let i=0; i<ball.trail.length; i++) {
    const t = ball.trail[i];
    const alpha = (i/ball.trail.length)*0.4;
    const r = BALL_R * (i/ball.trail.length) * 0.7;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#00c8ff';
    ctx.beginPath();
    ctx.arc(t.x, t.y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ball
  ctx.save();
  ctx.shadowColor = 'rgba(0,200,255,0.9)';
  ctx.shadowBlur = 18;
  const grad = ctx.createRadialGradient(ball.x-2,ball.y-2,1,ball.x,ball.y,BALL_R);
  grad.addColorStop(0,'#ffffff');
  grad.addColorStop(0.4,'#80eaff');
  grad.addColorStop(1,'#0099cc');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // paddle
  ctx.save();
  ctx.shadowColor = 'rgba(0,200,255,0.6)';
  ctx.shadowBlur = 14;
  const pg = ctx.createLinearGradient(paddle.x-paddle.w/2,paddle.y,paddle.x+paddle.w/2,paddle.y+PADDLE_H);
  pg.addColorStop(0,'#00c8ff');
  pg.addColorStop(1,'#0055aa');
  ctx.fillStyle = pg;
  ctx.beginPath();
  const px2 = paddle.x, half = paddle.w/2;
  const cr = 5;
  ctx.moveTo(px2-half+cr, paddle.y);
  ctx.lineTo(px2+half-cr, paddle.y);
  ctx.quadraticCurveTo(px2+half, paddle.y, px2+half, paddle.y+cr);
  ctx.lineTo(px2+half, paddle.y+PADDLE_H-cr);
  ctx.quadraticCurveTo(px2+half, paddle.y+PADDLE_H, px2+half-cr, paddle.y+PADDLE_H);
  ctx.lineTo(px2-half+cr, paddle.y+PADDLE_H);
  ctx.quadraticCurveTo(px2-half, paddle.y+PADDLE_H, px2-half, paddle.y+PADDLE_H-cr);
  ctx.lineTo(px2-half, paddle.y+cr);
  ctx.quadraticCurveTo(px2-half, paddle.y, px2-half+cr, paddle.y);
  ctx.closePath();
  ctx.fill();
  // sheen
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillRect(px2-half+4, paddle.y+2, paddle.w-8, 3);
  ctx.restore();
}

// ─── loop ────────────────────────────────────────────────
function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

function stopLoop() { cancelAnimationFrame(animId); }

// ─── state changes ────────────────────────────────────────
function startGame() {
  overlay.style.display = 'none';
  initGame();
  state = 'playing';
  loop();
}

function gameOver() {
  stopLoop();
  state = 'idle';
  overlay.innerHTML = `
    <h2 class="lose">GAME OVER</h2>
    <p>Score: ${score} &nbsp;·&nbsp; Hi-Score: ${hiScore}</p>
    <button class="btn" id="startBtn">PLAY AGAIN</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('startBtn').onclick = startGame;
}

function nextLevel() {
  stopLoop();
  level++;
  paddle.w = Math.max(40, 80 - (level-1)*5);
  buildBricks();
  spawnBall();
  particles = [];
  updateHUD();

  overlay.innerHTML = `
    <h2 class="win">LEVEL ${level}</h2>
    <p>Score: ${score}</p>
    <button class="btn" id="startBtn">CONTINUE</button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('startBtn').onclick = () => {
    overlay.style.display = 'none';
    state = 'playing';
    loop();
  };
}

function updateHUD() {
  scoreEl.textContent = score;
  levelEl.textContent = level || 1;
  livesEl.textContent = lives;
  hiEl.textContent    = hiScore;
}

// ─── input ───────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if(e.key.startsWith('Arrow')) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key] = false);

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
});
canvas.addEventListener('mouseleave', () => mouseX = null);

startBtn.onclick = startGame;
updateHUD();
</script>
</body>
</html>
